<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>点灯ドライブ アーキテクチャ図（74HCT595×2 制御）</title>
<desc>M5Stampが3本（Data/Clock/Latch）で74HCT595を2個駆動し、16bitで74141×2（数字）・アノードHVスイッチ×4（桁）・ドットドライバ×4を制御して8桁のニキシー管を1/4多重点灯する構成。74139は不要。</desc>
<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#1a1a1a"/></marker>
<marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#dc2626"/></marker>
</defs>
<style>
text{font-family:sans-serif;fill:#1a1a1a}
.t{font-size:14px}.ts{font-size:12px}
.blk{fill:#f0f0f0;stroke:#888;stroke-width:1}
.w{fill:none;stroke:#1a1a1a;stroke-width:1.4}
.hv{fill:none;stroke:#dc2626;stroke-width:1.6}
.grp{fill:none;stroke:#888;stroke-width:1.2;stroke-dasharray:5 4}
.tube{fill:none;stroke:#dc2626;stroke-width:1.4}
</style>

<rect class="blk" x="16" y="158" width="82" height="56" rx="6"/>
<text class="t" x="57" y="182" text-anchor="middle">M5Stamp</text>
<text class="ts" x="57" y="200" text-anchor="middle">ESP32</text>

<path class="w" d="M98,186 H150" marker-end="url(#ar)"/>
<text class="ts" x="104" y="180">3本</text>
<text class="ts" x="100" y="212">D/CLK/Lat</text>

<rect class="blk" x="150" y="150" width="108" height="76" rx="6"/>
<text class="t" x="204" y="180" text-anchor="middle">74HCT595×2</text>
<text class="ts" x="204" y="198" text-anchor="middle">16bit 出力</text>
<text class="ts" x="204" y="214" text-anchor="middle">各線 4bit ↓</text>

<rect class="blk" x="305" y="44" width="140" height="44" rx="5"/>
<text class="t" x="375" y="64" text-anchor="middle">74141-A</text>
<text class="ts" x="375" y="79" text-anchor="middle">数字 桁1-4 (BCD4)</text>

<rect class="blk" x="305" y="104" width="140" height="44" rx="5"/>
<text class="t" x="375" y="124" text-anchor="middle">74141-B</text>
<text class="ts" x="375" y="139" text-anchor="middle">数字 桁5-8 (BCD4)</text>

<rect class="blk" x="305" y="196" width="140" height="44" rx="5"/>
<text class="ts" x="375" y="215" text-anchor="middle">アノードHV-SW×4</text>
<text class="ts" x="375" y="231" text-anchor="middle">桁スロット選択</text>
<text class="ts" x="305" y="190" fill="#dc2626">+180V</text>
<path class="hv" d="M420,182 V196" marker-end="url(#arr)"/>

<rect class="blk" x="305" y="288" width="140" height="44" rx="5"/>
<text class="ts" x="375" y="307" text-anchor="middle">ドットドライバ×4</text>
<text class="ts" x="375" y="323" text-anchor="middle">MPSA42 LA/RA/LB/RB</text>

<path class="w" d="M258,160 H272 V66 H305" marker-end="url(#ar)"/>
<path class="w" d="M258,170 H280 V126 H305" marker-end="url(#ar)"/>
<path class="w" d="M258,205 H288 V218 H305" marker-end="url(#ar)"/>
<path class="w" d="M258,222 H296 V310 H305" marker-end="url(#ar)"/>

<text class="ts" x="510" y="62">IN-14 ニキシー管 ×8</text>
<rect class="grp" x="505" y="92" width="160" height="80" rx="4"/>
<text class="ts" x="510" y="108">グループA：桁1-4</text>
<circle class="tube" cx="535" cy="142" r="13"/>
<circle class="tube" cx="573" cy="142" r="13"/>
<circle class="tube" cx="611" cy="142" r="13"/>
<circle class="tube" cx="649" cy="142" r="13"/>
<rect class="grp" x="505" y="240" width="160" height="80" rx="4"/>
<text class="ts" x="510" y="256">グループB：桁5-8</text>
<circle class="tube" cx="535" cy="290" r="13"/>
<circle class="tube" cx="573" cy="290" r="13"/>
<circle class="tube" cx="611" cy="290" r="13"/>
<circle class="tube" cx="649" cy="290" r="13"/>

<path class="w" d="M445,66 H476 V128 H505" marker-end="url(#ar)"/>
<text class="ts" x="450" y="60">カソードA×10</text>
<path class="w" d="M445,126 H466 V270 H505" marker-end="url(#ar)"/>
<text class="ts" x="450" y="120">カソードB×10</text>
<path class="hv" d="M445,210 H505" marker-end="url(#arr)"/>
<text class="ts" x="450" y="204" fill="#dc2626">アノードバス×4</text>
<path class="w" d="M445,310 H488 V300 H505" marker-end="url(#ar)"/>
<text class="ts" x="450" y="328">ドットバス×4</text>

<text class="ts" x="16" y="366">M5Stamp 3本 → 74HCT595×2 → 全ドライバ。アノード4bit・ドット4bitも595から直接出力（74139は不要）。OEにPWMで輝度調整。</text>
</svg>
