<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>1/4多重化 点灯ドライブ アーキテクチャ図</title>
<desc>M5Stampが2個の74141（カソード/数字選択）と74139経由の4個のアノードHVスイッチ（桁選択）を制御し、8桁のニキシー管を2グループ4スロットで多重点灯する構成。</desc>
<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#1a1a1a"/></marker>
<marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#dc2626"/></marker>
</defs>
<style>
text{font-family:sans-serif;fill:#1a1a1a}
.t{font-size:14px}.ts{font-size:12px}
.blk{fill:#f0f0f0;stroke:#888;stroke-width:1}
.w{fill:none;stroke:#1a1a1a;stroke-width:1.4}
.hv{fill:none;stroke:#dc2626;stroke-width:1.6}
.grp{fill:none;stroke:#888;stroke-width:1.2;stroke-dasharray:5 4}
.tube{fill:none;stroke:#dc2626;stroke-width:1.4}
.dash{fill:none;stroke:#888;stroke-width:1.1;stroke-dasharray:4 3}
.dot{fill:#dc2626}
</style>

<rect class="blk" x="24" y="150" width="92" height="66" rx="6"/>
<text class="t" x="70" y="186" text-anchor="middle">M5Stamp</text>
<text class="ts" x="70" y="204" text-anchor="middle">ESP32</text>

<rect class="blk" x="176" y="44" width="120" height="46" rx="5"/>
<text class="t" x="236" y="68" text-anchor="middle">74139</text>
<text class="ts" x="236" y="84" text-anchor="middle">桁スロット選択</text>

<rect class="blk" x="176" y="150" width="120" height="46" rx="5"/>
<text class="t" x="236" y="174" text-anchor="middle">74141-A</text>
<text class="ts" x="236" y="190" text-anchor="middle">数字 桁1-4</text>

<rect class="blk" x="176" y="250" width="120" height="46" rx="5"/>
<text class="t" x="236" y="274" text-anchor="middle">74141-B</text>
<text class="ts" x="236" y="290" text-anchor="middle">数字 桁5-8</text>

<rect class="blk" x="372" y="44" width="152" height="46" rx="5"/>
<text class="t" x="448" y="68" text-anchor="middle">アノードHV-SW×4</text>
<text class="ts" x="448" y="84" text-anchor="middle">MPSA92+MPSA42</text>
<text class="ts" x="372" y="34" fill="#dc2626">+180V</text>
<path class="hv" d="M448,34 V44" marker-end="url(#arr)"/>

<path class="w" d="M116,178 H176" marker-end="url(#ar)"/>
<text class="ts" x="130" y="172">BCD×4</text>
<path class="w" d="M70,216 V274 H176" marker-end="url(#ar)"/>
<text class="ts" x="86" y="268">BCD×4</text>
<path class="w" d="M92,150 V66 H176" marker-end="url(#ar)"/>
<text class="ts" x="96" y="60">スロット+ブランク</text>
<path class="w" d="M296,67 H372" marker-end="url(#ar)"/>
<text class="ts" x="310" y="60">選択×4</text>

<path class="w" d="M296,173 H330" marker-end="url(#ar)"/>
<text class="ts" x="300" y="167">カソード×10</text>
<path class="w" d="M296,273 H330" marker-end="url(#ar)"/>
<text class="ts" x="300" y="267">カソード×10</text>

<path class="hv" d="M448,90 V126"/>
<path class="hv" d="M370,126 H580"/>
<circle class="dot" cx="448" cy="126" r="2.5"/>
<text class="ts" x="455" y="118" fill="#dc2626">アノードバス×4</text>
<path class="hv" d="M370,126 V150" marker-end="url(#arr)"/>
<path class="hv" d="M440,126 V150" marker-end="url(#arr)"/>
<path class="hv" d="M510,126 V150" marker-end="url(#arr)"/>
<path class="hv" d="M580,126 V150" marker-end="url(#arr)"/>

<rect class="grp" x="330" y="150" width="320" height="72" rx="4"/>
<text class="ts" x="330" y="145">グループA：桁1-4</text>
<circle class="tube" cx="370" cy="186" r="22"/><text class="ts" x="370" y="191" text-anchor="middle">1</text>
<circle class="tube" cx="440" cy="186" r="22"/><text class="ts" x="440" y="191" text-anchor="middle">2</text>
<circle class="tube" cx="510" cy="186" r="22"/><text class="ts" x="510" y="191" text-anchor="middle">3</text>
<circle class="tube" cx="580" cy="186" r="22"/><text class="ts" x="580" y="191" text-anchor="middle">4</text>

<rect class="grp" x="330" y="250" width="320" height="72" rx="4"/>
<text class="ts" x="330" y="245">グループB：桁5-8</text>
<circle class="tube" cx="370" cy="286" r="22"/><text class="ts" x="370" y="291" text-anchor="middle">5</text>
<circle class="tube" cx="440" cy="286" r="22"/><text class="ts" x="440" y="291" text-anchor="middle">6</text>
<circle class="tube" cx="510" cy="286" r="22"/><text class="ts" x="510" y="291" text-anchor="middle">7</text>
<circle class="tube" cx="580" cy="286" r="22"/><text class="ts" x="580" y="291" text-anchor="middle">8</text>

<path class="dash" d="M370,208 V264"/>
<path class="dash" d="M440,208 V264"/>
<path class="dash" d="M510,208 V264"/>
<path class="dash" d="M580,208 V264"/>

<text class="ts" x="24" y="352">縦（列）＝アノードで桁選択　／　横（行）＝カソードで数字選択（74141）　／　毎スロット2桁点灯・各桁デューティ1/4</text>
</svg>
