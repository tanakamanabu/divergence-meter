<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>5V→180V フライバック昇圧回路（MC34063A・結合インダクタ1:10・外付けFET無し）</title>
<desc>MC34063A フライバック構成（5V→180V）。結合インダクタ T1（1:10、Coilcraft LPR6235-253）の一次側を MC34063 内蔵スイッチ（SWC(1)/SWE(2)）で直接スイッチし、外付けFETは不要。スイッチOFF時の一次電圧は約23V（=5+180/10）で内蔵40Vスイッチの定格内に収まり、一次側のツェナークランプ（高速ダイオード Dsn ＋ ツェナー DZ 27〜30V）で漏れインダクタのスパイクをクランプする。二次側を D(UF4007) で整流し +180V。電流検出 Rsc は VCC(6)–Ipk(7) 間、発振はタイミングコンデンサ Ct を CT(3) に、出力電圧は FB(5) 分圧（基準1.25V）で約181V。8ピンすべて結線、開放ピンなし。</desc>
<style>
.w{fill:none;stroke:#1a1a1a;stroke-width:1.2}
.b{fill:none;stroke:#2563eb;stroke-width:1.5}
