<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>5Vから180Vへの昇圧コンバータ回路図（MC34063A・外付けFET）</title>
<desc>MC34063A 昇圧コントローラで外付け Nch FET をゲート駆動。電流検出 Rsc は VCC と Ipk の間（ハイサイド、入力電流経路）に入り、約0.3Vでピーク制限。発振周波数はタイミングコンデンサ Ct で設定。出力電圧は FB 分圧（R1/R2、基準1.25V）で約181V。MOSFET ソースは直接 GND。</desc>
<style>
.w{fill:none;stroke:#1a1a1a;stroke-width:1.2}
.b{fill:none;stroke:#2563eb;stroke-width:1.5}
.r{fill:none;stroke:#dc2626;stroke-width:1.5}
.c{fill:none;stroke:#777;stroke-width:1.1;stroke-dasharray:4 3}
.body{fill:none;stroke:#1a1a1a;stroke-width:1.4}
.dot{fill:#1a1a1a}
.tri{fill:#1a1a1a}
text{font-family:sans-serif;fill:#1a1a1a}
.t{font-size:14px}.ts{font-size:12px}
.box{fill:#f0f0f0;stroke:#888;stroke-width:1}
</style>

<path class="b" d="M40,70 H105"/>
<circle class="dot" cx="40" cy="70" r="3"/>
<text class="ts" x="34" y="58">+5V in</text>

