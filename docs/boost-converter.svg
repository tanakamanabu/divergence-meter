<text class="ts" x="414" y="196">C_out</text>
<text class="ts" x="414" y="210">10µF/250V</text>

<path class="r" d="M520,70 V150"/>
<rect class="body" x="512" y="150" width="16" height="95"/>
<path class="w" d="M520,245 V350"/>
<text class="ts" x="532" y="195">Rb 470k</text>
<text class="ts" x="532" y="209">2W</text>

<path class="r" d="M600,70 V100"/>
