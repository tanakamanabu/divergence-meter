<circle class="dot" cx="600" cy="372" r="2.5"/>

<text class="ts" x="40" y="405">青 = +5V 系  /  赤 = +180V 系  /  破線 = 制御信号  /  電流検出はハイサイド（VCC〜Ipk 間に Rsc）</text>
