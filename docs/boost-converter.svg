<svg width="100%" viewBox="0 0 680 392" role="img" xmlns="http://www.w3.org/2000/svg">
<title>5Vから180Vへの昇圧コンバータ回路図</title>
<desc>MAX1771 昇圧コントローラを用いた、入力5Vから出力約180Vのブーストコンバータ。インダクタ、NチャネルパワーMOSFET、高速ダイオード、出力コンデンサ、帰還分圧抵抗、放電用ブリーダ抵抗で構成。</desc>
<style>
.w{fill:none;stroke:#1a1a1a;stroke-width:1.2}
.b{fill:none;stroke:#2563eb;stroke-width:1.5}
.r{fill:none;stroke:#dc2626;stroke-width:1.5}
.c{fill:none;stroke:#777;stroke-width:1.1;stroke-dasharray:4 3}
.body{fill:none;stroke:#1a1a1a;stroke-width:1.4}
.dot{fill:#1a1a1a}
.tri{fill:#1a1a1a}
text{font-family:sans-serif;fill:#1a1a1a}
.t{font-size:14px}
.ts{font-size:12px}
.box{fill:#f0f0f0;stroke:#888;stroke-width:1}
</style>

<path class="b" d="M40,70 H110"/>
<circle class="dot" cx="40" cy="70" r="3"/>
<text class="ts" x="34" y="58">+5V in</text>

<path class="b" d="M55,70 V182"/>
<path class="b" d="M43,182 H67"/>
<path class="b" d="M43,193 H67"/>
<path class="w" d="M55,193 V350"/>
<circle class="dot" cx="55" cy="70" r="2.5"/>
<text class="ts" x="62" y="150">C_in 22µF</text>

<path class="b" d="M100,70 V240"/>
<circle class="dot" cx="100" cy="70" r="2.5"/>

<path class="body" d="M110,70 q11,-13 22,0 q11,-13 22,0 q11,-13 22,0 q11,-13 22,0"/>
<text class="ts" x="118" y="52">L 47µH</text>

<path class="w" d="M198,70 H350"/>
<text class="ts" x="250" y="60">SW</text>
<circle class="dot" cx="300" cy="70" r="2.5"/>
<path class="w" d="M300,70 V160"/>

<line class="body" x1="300" y1="160" x2="300" y2="200"/>
<line class="body" x1="288" y1="164" x2="288" y2="196"/>
<path class="c" d="M200,240 V180 H288"/>
<text class="t" x="314" y="172">Q</text>
<text class="ts" x="314" y="187">IRF740</text>
<text class="ts" x="314" y="201">Vds 400V</text>

<path class="w" d="M300,200 V215"/>
<rect class="body" x="292" y="215" width="16" height="38"/>
<path class="w" d="M300,253 V350"/>
<text class="ts" x="316" y="234">Rsense</text>
<text class="ts" x="316" y="248">0.1Ω</text>

<polygon class="tri" points="350,62 350,78 372,70"/>
<line class="w" x1="374" y1="60" x2="374" y2="80"/>
<text class="ts" x="333" y="50">D  UF4007</text>

<path class="r" d="M374,70 H630"/>
<circle class="dot" cx="630" cy="70" r="3"/>
<text class="ts" x="582" y="58">+180V out</text>
<circle class="dot" cx="400" cy="70" r="2.5"/>
<circle class="dot" cx="520" cy="70" r="2.5"/>
<circle class="dot" cx="600" cy="70" r="2.5"/>

<path class="r" d="M400,70 V182"/>
<path class="r" d="M388,182 H412"/>
<path class="r" d="M388,193 H412"/>
<path class="w" d="M400,193 V350"/>
