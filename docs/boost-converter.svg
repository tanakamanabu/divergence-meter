<text class="ts" x="314" y="201">Vds 400V</text>

<path class="w" d="M300,200 V372"/>

<polygon class="tri" points="320,62 320,78 342,70"/>
<line class="w" x1="344" y1="60" x2="344" y2="80"/>
<text class="ts" x="316" y="50">D UF4007</text>

<path class="r" d="M344,70 H630"/>
<circle class="dot" cx="630" cy="70" r="3"/>
<text class="ts" x="582" y="58">+180V out</text>
