<rect class="body" x="592" y="175" width="16" height="50"/>
<path class="w" d="M600,225 V350"/>
<text class="ts" x="548" y="128">R1 1.8M</text>
<text class="ts" x="548" y="205">R2 15k</text>
<text class="ts" x="612" y="166">FB</text>

<path class="c" d="M600,162 H620 V362 H120 V335"/>

<rect class="box" x="75" y="240" width="165" height="95" rx="6"/>
<text class="t" x="157" y="282" text-anchor="middle">MAX1771</text>
<text class="ts" x="157" y="300" text-anchor="middle">昇圧コントローラ</text>
<text class="ts" x="100" y="255" text-anchor="middle">VIN</text>
<text class="ts" x="200" y="255" text-anchor="middle">EXT</text>
<text class="ts" x="122" y="328" text-anchor="middle">FB</text>
<text class="ts" x="180" y="328" text-anchor="middle">GND</text>
<path class="w" d="M180,335 V350"/>

<path class="w" d="M40,350 H630"/>
<text class="ts" x="34" y="367">GND</text>
<circle class="dot" cx="300" cy="350" r="2.5"/>
<circle class="dot" cx="400" cy="350" r="2.5"/>
<circle class="dot" cx="520" cy="350" r="2.5"/>
<circle class="dot" cx="600" cy="350" r="2.5"/>

<text class="ts" x="40" y="385">青 = +5V 系   /   赤 = +180V 系   /   破線 = 制御信号</text>
</svg>
